<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- App Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Outer Glow -->
  <circle cx="256" cy="256" r="180" fill="#3b82f6" opacity="0.15" filter="blur(40px)"/>
  
  <!-- Login Card -->
  <rect x="120" y="120" width="272" height="272" rx="32" fill="#1e293b" fill-opacity="0.8" stroke="#334155" stroke-width="4" filter="url(#shadow)"/>
  
  <!-- Avatar / Header -->
  <circle cx="256" cy="170" r="28" fill="#3b82f6" fill-opacity="0.2"/>
  <circle cx="256" cy="165" r="10" fill="#60a5fa"/>
  <path d="M236 190 Q256 175 276 190 L276 198 L236 198 Z" fill="#60a5fa"/>
  
  <!-- Username Field -->
  <rect x="160" y="220" width="192" height="32" rx="8" fill="#0f172a" fill-opacity="0.6" stroke="#334155" stroke-width="2"/>
  <rect x="176" y="232" width="60" height="8" rx="4" fill="#64748b"/>
  
  <!-- Password Field -->
  <rect x="160" y="270" width="192" height="32" rx="8" fill="#0f172a" fill-opacity="0.6" stroke="#334155" stroke-width="2"/>
  <circle cx="180" cy="286" r="4" fill="#94a3b8"/>
  <circle cx="196" cy="286" r="4" fill="#94a3b8"/>
  <circle cx="212" cy="286" r="4" fill="#94a3b8"/>
  <circle cx="228" cy="286" r="4" fill="#94a3b8"/>
  
  <!-- Login Button -->
  <rect x="160" y="325" width="192" height="36" rx="10" fill="url(#primary)"/>
  <rect x="236" y="340" width="40" height="6" rx="3" fill="#ffffff"/>
</svg>
